<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forkify</title>
    <link rel="stylesheet" href="./src/css/output.css" />

    <link rel="icon" type="image/x-icon" href="./src/img/favicon.png" />
    <script
      src="https://kit.fontawesome.com/4fdedd800a.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body
    class="bg-linear-to-br from-grad-2 to-grad-1 h-screen flex justify-center items-center"
  >
    <main
      class="scrollbar w-10/12 h-10/12 bg-white rounded relative flex flex-col"
    >
      <header class="flex flex-row p-3 justify-between items-center">
        <img class="w-32" src="./src/img/logo.png" alt="forkify logo" />

        <div class="w-1/3 flex flex-row">
          <input
            class="p-2 rounded-2xl h-10 w-2/3 text-[12px] md:text-base"
            type="text"
            placeholder="Search over 1,000,000 recipes"
          />
          <button
            class="h-10 w-1/3 bg-linear-to-br from-grad-2 to-grad-1 rounded-3xl text-white cursor-pointer hover:scale-110 transition"
            type="submit"
          >
            <i class="fa fa-search text-white"></i>
            <span class="hidden md:inline">Search</span>
          </button>
        </div>

        <div class="w-3/12 flex items-center justify-end">
          <button
            class="mr-1 lg:flex items-center hover:scale-110 transition cursor-pointer"
          >
            <i class="fa fa-book text-primary"></i>
            <span class="hidden lg:inline-block text-lg text-nowrap"
              >Add recipe
            </span>
          </button>
          <button
            class="mx-2 flex items-center hover:scale-110 transition cursor-pointer"
          >
            <i class="fa fa-bookmark text-primary"></i>
            <span class="hidden lg:inline-block text-lg">Bookmarks</span>
          </button>
        </div>
      </header>
      <div id="app-body" class="flex flex-row h-full flex-1 min-h-0">
        <section id="recipes-list" class="w-2/5 flex flex-col">
          <a
            class="tag p-2 text-white text-xl bg-linear-to-br from-grad-1 to-grad-2"
            href="#5ed6604591c37cdc054bc886"
            >recipe 1</a
          >
          <a
            class="tag p-2 text-white text-xl bg-linear-to-br from-grad-1 to-grad-2 mt-2"
            href="#664c8f193e7aa067e94e8297"
            >recipe 2</a
          >
          <a
            class="tag p-2 text-white text-xl bg-linear-to-br from-grad-1 to-grad-2 mt-2"
            href="#664c8f193e7aa067e94e840d"
            >recipe 3</a
          >
          <a
            class="tag p-2 text-white text-xl bg-linear-to-br from-grad-1 to-grad-2 mt-2"
            href="#664c8f193e7aa067e94e894f"
            >recipe 4</a
          >
          <a
            class="tag p-2 text-white text-xl bg-linear-to-br from-grad-1 to-grad-2 mt-2"
            href="#664c8f193e7aa067e94e894faaaa"
            >error</a
          >
        </section>
        <section id="recipe-container" class="scrollbar w-3/5 overflow-scroll">
          <p id="starting-text" class="text-primary md:text-xl mt-10 ml-5">
            <i class="fa-regular fa-face-smile"></i> Start with searching a
            recipe
          </p>
        </section>
      </div>
    </main>
    <!-- <img src="./src/img/spinner.gif" alt="" /> -->

    <script src="./src/js/controller.js" type="module"></script>
  </body>
</html>
